<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>叶子老师排课工具</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #4F6CF7;
  --primary-light: #EEF1FF;
  --primary-dark: #3B55D9;
  --success: #10B981;
  --success-light: #ECFDF5;
  --danger: #EF4444;
  --danger-light: #FEF2F2;
  --warning: #F59E0B;
  --warning-light: #FFFBEB;
  --bg: #F4F5F9;
  --surface: #FFFFFF;
  --text: #1E293B;
  --text-secondary: #64748B;
  --text-muted: #94A3B8;
  --border: #E8ECF2;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 32px rgba(0,0,0,.1);
  --radius: 12px;
  --radius-sm: 8px;
  --cell-min-w: 80px;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif}
body{background:var(--bg);color:var(--text);padding-bottom:80px;-webkit-font-smoothing:antialiased}

/* Nav */
.nav-bar{background:var(--surface);padding:10px 16px;display:flex;gap:6px;position:sticky;top:0;z-index:99;border-bottom:1px solid var(--border);backdrop-filter:blur(8px)}
.nav-bar button{flex:1;border:none;background:transparent;color:var(--text-secondary);padding:10px 0;border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:all .2s;position:relative}
.nav-bar button.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-bar button:not(.active):hover{background:#F1F4F9;color:var(--text)}

/* Week bar */
.week-bar{background:var(--surface);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.week-title{font-size:15px;font-weight:600;color:var(--text)}
.week-nav{display:flex;gap:6px}
.week-nav button{border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:all .15s}
.week-nav button:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}

/* Schedule scroll wrapper */
.schedule-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 0 8px 0}

/* Days row */
.days-row{display:flex;background:var(--surface);border-bottom:2px solid var(--border)}
.day-cell{text-align:center;padding:10px 4px;font-size:12px;font-weight:600;color:var(--text-secondary);border-right:1px solid var(--border);flex:1;min-width:var(--cell-min-w);line-height:1.5}
.day-cell:last-child{border-right:none}

/* Time rows */
.times-container{padding:6px 0 0 0}
.time-row{display:flex;border-bottom:1px solid var(--border);margin-bottom:3px;border-radius:var(--radius-sm);background:var(--surface);box-shadow:var(--shadow-sm);transition:box-shadow .15s}
.time-row:hover{box-shadow:var(--shadow-md)}

.time-label{width:48px;font-size:12px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600;background:var(--bg);border-right:1px solid var(--border);border-radius:var(--radius-sm) 0 0 var(--radius-sm);letter-spacing:.5px}

.time-slot{min-height:76px;padding:0;border-right:1px solid var(--border);cursor:pointer;transition:background .15s;background:var(--surface);flex:1;min-width:var(--cell-min-w);display:flex;align-items:center;justify-content:center}
.time-slot:last-child{border-right:none}
.time-slot:hover{background:#FAFBFF}

/* Schedule items — card matching D6 design (dot + name + time + ribbon) */
.schedule-item{position:relative;padding:6px 12px;width:calc(100% - 8px);border-radius:8px;cursor:pointer;transition:transform .1s,box-shadow .1s,background .3s;background:#eef2ff;text-align:center;line-height:1.5}
.schedule-item:hover{transform:scale(1.03);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.schedule-item.done{background:#ecfdf5}
.schedule-item .s-name{font-size:13px;font-weight:700;color:var(--primary-dark)}
.schedule-item.done .s-name{color:#065F46}
.schedule-item .s-time{font-size:10px;color:#64748b;line-height:1.4}
.schedule-item .s-time strong{color:#4f6cf7}
.schedule-item.done .s-time strong{color:#10b981}

/* D6: Bottom-right fold ribbon for done state */
.schedule-item .done-ribbon{position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 28px 28px;border-color:transparent transparent #10b981 transparent;display:none}
.schedule-item.done .done-ribbon{display:block}
.schedule-item .done-ribbon-inner{position:absolute;bottom:4px;right:4px;font-size:10px;color:#fff;font-weight:700;display:none;z-index:1}
.schedule-item.done .done-ribbon-inner{display:block}

/* Popup */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.popup-box{background:var(--surface);width:88%;max-width:380px;border-radius:16px;padding:24px;max-height:80vh;overflow:auto;box-shadow:var(--shadow-lg);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.popup-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px;letter-spacing:-.3px}
.student-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.student-item{background:var(--primary-light);padding:10px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;color:var(--primary);cursor:pointer;transition:all .15s;border:1px solid transparent}
.student-item:hover{background:var(--primary);color:#fff;border-color:var(--primary);transform:translateY(-1px);box-shadow:0 4px 8px rgba(79,108,247,.25)}
.popup-buttons{display:flex;gap:8px}
.popup-buttons button{flex:1;padding:11px 10px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-done{background:var(--success-light);color:#065F46}
.btn-done:hover{background:var(--success);color:#fff}
.btn-clear{background:var(--danger-light);color:#991B1B}
.btn-clear:hover{background:var(--danger);color:#fff}
.btn-close{background:var(--bg);color:var(--text-secondary)}
.btn-close:hover{background:#E2E8F0;color:var(--text)}
.btn-export{background:var(--primary-light);color:var(--primary)}
.btn-export:hover{background:var(--primary);color:#fff}

/* Pages */
.page{display:none;padding:12px 16px}
.page.active{display:block}

/* Student management */
.add-student{display:flex;gap:8px;margin-bottom:20px}
.add-student input{flex:1;padding:12px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;transition:border .15s;outline:none;background:var(--surface)}
.add-student input:focus{border-color:var(--primary)}
.add-student button{padding:12px 20px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.add-student button:hover{background:var(--primary-dark);box-shadow:0 4px 8px rgba(79,108,247,.25)}

.student-item-manage{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--surface);border-radius:var(--radius);margin-bottom:10px;box-shadow:var(--shadow-sm);border:1px solid var(--border);transition:box-shadow .15s}
.student-item-manage:hover{box-shadow:var(--shadow-md)}
.student-item-manage > span{font-size:15px;font-weight:600;color:var(--text)}

.student-btn-group{display:flex;gap:6px}
.student-item-manage button{border:none;padding:7px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-record{background:var(--primary-light);color:var(--primary)}
.btn-record:hover{background:var(--primary);color:#fff}
.btn-memo{background:var(--warning-light);color:#92400E}
.btn-memo:hover{background:var(--warning);color:#fff}
.btn-del{background:var(--danger-light);color:#991B1B}
.btn-del:hover{background:var(--danger);color:#fff}

/* Statistics */
.stat-week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.stat-week-nav button{border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:all .15s}
.stat-week-nav button:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.stat-week-text{font-weight:600;font-size:15px;color:var(--text)}
.stat-box{background:var(--surface);padding:20px;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.stat-item{padding:10px 0;font-size:14px;color:var(--text);border-bottom:1px solid var(--border)}
.stat-item:last-child{border-bottom:none}
.stat-total{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text);letter-spacing:-.3px}
.flow-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);line-height:1.5}
.flow-item:last-child{border-bottom:none}
.record-empty{text-align:center;color:var(--text-muted);padding:32px 0;font-size:14px}

/* Memo styles */
.memo-item{padding:14px;background:#FAFBFF;border-radius:var(--radius-sm);margin-bottom:10px;border:1px solid var(--border);transition:box-shadow .15s}
.memo-item:hover{box-shadow:var(--shadow-sm)}
.memo-date{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:6px}
.memo-content-text{font-size:14px;color:var(--text);margin-bottom:10px;white-space:pre-wrap;word-break:break-word;line-height:1.6}
.memo-actions{display:flex;gap:6px;justify-content:flex-end}
.memo-btn{border:1px solid var(--border);padding:5px 12px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;font-weight:500}
.memo-btn-del{background:var(--danger-light);color:#991B1B;border-color:transparent}
.memo-btn-del:hover{background:var(--danger);color:#fff}
.memo-form{margin-bottom:16px}
.memo-form input,.memo-form textarea{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:13px;transition:border .15s;outline:none;background:var(--surface)}
.memo-form input:focus,.memo-form textarea:focus{border-color:var(--primary)}
.memo-form textarea{resize:vertical;min-height:70px;margin-top:8px;font-family:inherit}
.memo-form .btn-add{width:100%;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);margin-top:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.memo-form .btn-add:hover{background:var(--primary-dark);box-shadow:0 4px 8px rgba(79,108,247,.25)}
</style>
</head>
<body>
<div class="nav-bar">
  <button class="active" onclick="switchPage('schedule')">📅 排课</button>
  <button onclick="switchPage('student')">👥 学生</button>
  <button onclick="switchPage('stat')">📊 统计</button>
</div>
<div class="page active" id="page-schedule">
  <div class="week-bar">
    <div class="week-title" id="weekText">本周</div>
    <div class="week-nav">
      <button onclick="prevWeek()">‹ 上一周</button>
      <button onclick="nextWeek()">下一周 ›</button>
    </div>
  </div>
  <div class="schedule-scroll">
    <div class="days-row" id="daysRow"></div>
    <div class="times-container" id="timesContainer"></div>
  </div>
</div>
<div class="page" id="page-student">
  <div class="add-student">
    <input type="text" id="stuInput" placeholder="输入学生姓名">
    <button onclick="addStudent()">＋ 添加</button>
  </div>
  <div id="stuListManage"></div>
</div>
<div class="page" id="page-stat">
  <div class="stat-week-nav">
    <button onclick="statPrevWeek()">‹ 上一周</button>
    <div class="stat-week-text" id="statWeekText">本周</div>
    <button onclick="statNextWeek()">下一周 ›</button>
  </div>
  <div class="stat-box">
    <div id="statResult"></div>
  </div>
</div>
<div class="popup" id="popup">
  <div class="popup-box">
    <div class="popup-title" id="popupTitle">安排课程</div>
    <div class="time-select-row" id="timeSelectRow" style="margin-bottom:12px">
      <select id="timeSelect" style="width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;outline:none;background:var(--surface);appearance:auto;cursor:pointer"></select>
    </div>
    <div class="student-list" id="studentList"></div>
    <div class="popup-buttons">
      <button class="btn-done" onclick="setDone()">✓ 标记已上课</button>
      <button class="btn-clear" onclick="clearSlot()">✕ 取消安排</button>
      <button class="btn-close" onclick="closePopup()">关闭</button>
    </div>
  </div>
</div>
<div class="popup" id="recordPopup">
  <div class="popup-box">
    <div class="popup-title" id="recordTitle">学生课程记录</div>
    <div id="recordList"></div>
    <div class="popup-buttons" style="margin-top:16px">
      <button class="btn-export" onclick="exportRecordExcel()">📥 导出全部记录</button>
      <button class="btn-close" onclick="closeRecordPopup()">关闭</button>
    </div>
  </div>
</div>
<div class="popup" id="memoPopup">
  <div class="popup-box">
    <div class="popup-title" id="memoTitle">备忘</div>
    <div class="memo-form">
      <input type="date" id="memoDate">
      <textarea id="memoContent" placeholder="输入备忘内容…"></textarea>
      <button class="btn-add" onclick="addMemo()">＋ 添加备忘</button>
    </div>
    <div id="memoList"></div>
    <div class="popup-buttons" style="margin-top:12px">
      <button class="btn-close" onclick="closeMemoPopup()" style="width:100%">关闭</button>
    </div>
  </div>
</div>
<script>
const startHour = 8;
const endHour = 20;
let currentWeekOffset = 0;
let currentSlotKey = "";
let recordStuName = "";
let currentRecordList = [];
let statWeekOffset = 0;
let currentMemoStudent = "";
let schedule = JSON.parse(localStorage.getItem("teacherSchedule")) || {};
let students = JSON.parse(localStorage.getItem("teacherStudents")) || ["张三","李四","王五","赵六"];
let studentMemos = JSON.parse(localStorage.getItem("teacherStudentMemos")) || {};

function migrateScheduleData(){
  let changed = false;
  const entries = Object.entries(schedule);
  for(const [key, item] of entries){
    if(!item || !item.name) continue;
    const parts = key.split("-");
    if(parts.length === 6){
      // Convert weekKey-dayIdx-hour-quarter → weekKey-dayIdx-hour + startQuarter
      const newKey = `${parts[0]}-${parts[1]}-${parts[2]}-${parts[3]}-${parts[4]}`;
      const quarter = parseInt(parts[5]);
      if(!schedule[newKey]){
        schedule[newKey] = { name: item.name, done: item.done || false, startQuarter: quarter };
      }
      delete schedule[key];
      changed = true;
    } else if(parts.length === 5 && item.startQuarter === undefined){
      item.startQuarter = 0;
      changed = true;
    }
  }
  if(changed) localStorage.setItem("teacherSchedule", JSON.stringify(schedule));
}

function switchPage(page){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+page).classList.add("active");
  document.querySelectorAll(".nav-bar button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  if(page==="student") renderStudentManage();
  if(page==="stat") calcStat();
}
function init(){
  migrateScheduleData();
  renderWeek();
  renderDays();
  renderTimeSlots();
  renderStudents();
  renderStudentManage();
}
function prevWeek(){currentWeekOffset--;renderWeek();renderDays();renderTimeSlots()}
function nextWeek(){currentWeekOffset++;renderWeek();renderDays();renderTimeSlots()}
function renderWeek(){
  const weekStart = getWeekStart(new Date(), currentWeekOffset);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate()+6);
  const fmt = d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById("weekText").innerText = `${fmt(weekStart)} - ${fmt(weekEnd)}`;
}
function getWeekStart(base, offset){
  const d = new Date(base);
  const day = d.getDay()||7;
  d.setDate(d.getDate() - day + 1 + offset*7);
  d.setHours(0,0,0,0);
  return d;
}
function renderDays(){
  const row = document.getElementById("daysRow");
  row.innerHTML = "";
  const spacer = document.createElement("div");
  spacer.style.cssText = "width:48px;flex-shrink:0";
  row.appendChild(spacer);
  const start = getWeekStart(new Date(), currentWeekOffset);
  const weekNames = ["周一","周二","周三","周四","周五","周六","周日"];
  for(let i=0;i<7;i++){
    const d = new Date(start);
    d.setDate(d.getDate()+i);
    const cell = document.createElement("div");
    cell.className = "day-cell";
    cell.innerHTML = `<div style="font-size:13px;color:var(--text)">${weekNames[i]}</div>${d.getMonth()+1}/${d.getDate()}`;
    row.appendChild(cell);
  }
}
function renderTimeSlots(){
  const container = document.getElementById("timesContainer");
  container.innerHTML = "";
  const weekKey = getWeekKey();
  for(let h=startHour; h<endHour; h++){
    const row = document.createElement("div");
    row.className = "time-row";
    const label = document.createElement("div");
    label.className = "time-label";
    label.innerText = `${h}:00`;
    row.appendChild(label);
    for(let d=0; d<7; d++){
      const cell = document.createElement("div");
      cell.className = "time-slot";
      const key = `${weekKey}-${d}-${h}`;
      const data = schedule[key];
      if(data){
        const q = data.startQuarter || 0;
        const parts = key.split("-");
        const h = parseInt(parts[4]);
        const startMin = q * 15;
        const endMin = startMin + 45;
        const endH = h + Math.floor(endMin / 60);
        const endM = endMin % 60;
        const timeStr = `${h}:${String(startMin).padStart(2,'0')}-${endH}:${String(endM).padStart(2,'0')}`;
        const timeParts = timeStr.split("-");
        const timeHtml = `<strong>${timeParts[0]}</strong> - ${timeParts[1]}`;
        const item = document.createElement("div");
        item.className = "schedule-item" + (data.done ? " done" : "");
        const itemHtml = data.done
          ? `<div class="s-name">${data.name}</div><div class="s-time">${timeHtml}</div><div class="done-ribbon"></div><div class="done-ribbon-inner">✓</div>`
          : `<div class="s-name">${data.name}</div><div class="s-time">${timeHtml}</div>`;
        item.innerHTML = itemHtml;
        item.onclick = (e)=>{ e.stopPropagation(); openPopup(key); };
        cell.appendChild(item);
      }
      cell.onclick = ()=>openPopup(key);
      row.appendChild(cell);
    }
    container.appendChild(row);
  }
}
function getWeekKey(){
  const s = getWeekStart(new Date(), currentWeekOffset);
  return `${s.getFullYear()}-${s.getMonth()+1}-${s.getDate()}`;
}
function openPopup(key){
  currentSlotKey = key;
  const data = schedule[key];
  const timeSelectRow = document.getElementById("timeSelectRow");
  const timeSelect = document.getElementById("timeSelect");
  const title = document.getElementById("popupTitle");
  const doneBtn = document.querySelector("#popup .btn-done");
  const clearBtn = document.querySelector("#popup .btn-clear");
  if(!data){
    const h = parseInt(key.split("-")[4]);
    timeSelectRow.style.display = "block";
    timeSelect.innerHTML = "";
    for(let q=0; q<4; q++){
      const opt = document.createElement("option");
      opt.value = q;
      opt.innerText = `${h}:${String(q*15).padStart(2,'0')}`;
      timeSelect.appendChild(opt);
    }
    title.innerText = "安排课程";
    doneBtn.style.display = "none";
    clearBtn.style.display = "none";
  } else {
    timeSelectRow.style.display = "none";
    doneBtn.style.display = "";
    clearBtn.style.display = "";
    title.innerText = `${data.name} · ${formatSlotTime(key)}`;
  }
  document.getElementById("popup").style.display = "flex";
}
function closePopup(){document.getElementById("popup").style.display = "none"}
function renderStudents(){
  const list = document.getElementById("studentList");
  list.innerHTML = "";
  students.forEach(stu=>{
    const item = document.createElement("div");
    item.className = "student-item";
    item.innerText = stu;
    item.onclick = ()=>assignStudent(stu);
    list.appendChild(item);
  });
}
function assignStudent(name){
  const data = schedule[currentSlotKey];
  if(data){
    data.name = name;
    data.done = false;
  } else {
    const q = parseInt(document.getElementById("timeSelect").value);
    schedule[currentSlotKey] = { name, done: false, startQuarter: q };
  }
  saveAll();
  renderTimeSlots();
  closePopup();
}
function setDone(){
  if(schedule[currentSlotKey]){
    schedule[currentSlotKey].done = true;
    saveAll();
    renderTimeSlots();
  }
  closePopup();
}
function clearSlot(){
  delete schedule[currentSlotKey];
  saveAll();
  renderTimeSlots();
  closePopup();
}
function renderStudentManage(){
  const wrap = document.getElementById("stuListManage");
  wrap.innerHTML = "";
  students.forEach((stu,i)=>{
    const div = document.createElement("div");
    div.className = "student-item-manage";
    div.innerHTML = `<span>${stu}</span><div class="student-btn-group"><button class="btn-record" onclick="openRecord('${stu}')">📋 课程记录</button><button class="btn-memo" onclick="openMemo('${stu}')">📝 备忘</button><button class="btn-del" onclick="delStudent(${i})">删除</button></div>`;
    wrap.appendChild(div);
  });
}
function addStudent(){
  const name = document.getElementById("stuInput").value.trim();
  if(!name) return;
  students.push(name);
  document.getElementById("stuInput").value = "";
  saveAll();
  renderStudents();
  renderStudentManage();
}
function delStudent(idx){
  const name = students[idx];
  students.splice(idx,1);
  delete studentMemos[name];
  saveAll();
  renderStudents();
  renderStudentManage();
}
function openRecord(name){
  recordStuName = name;
  renderRecordList();
  document.getElementById("recordPopup").style.display = "flex";
}
function closeRecordPopup(){
  document.getElementById("recordPopup").style.display = "none";
}
function formatSlotTime(key){
  const data = schedule[key];
  if(!data) return "";
  const parts = key.split("-");
  const h = parseInt(parts[4]);
  const q = data.startQuarter || 0;
  const startMin = q * 15;
  const endMin = startMin + 45;
  const endH = h + Math.floor(endMin / 60);
  const endM = endMin % 60;
  return `${h}:${String(startMin).padStart(2,'0')}-${endH}:${String(endM).padStart(2,'0')}`;
}
function renderRecordList(){
  const listWrap = document.getElementById("recordList");
  listWrap.innerHTML = "";
  currentRecordList = [];
  const now = new Date();
  const monthAgo = new Date(now);
  monthAgo.setDate(monthAgo.getDate() - 30);
  const fmt = d=>`${d.getMonth()+1}/${d.getDate()}`;
  const title = document.getElementById("recordTitle");
  title.innerHTML = `${recordStuName} 课程记录<div style="font-size:13px;color:var(--text-secondary);font-weight:400;margin-top:4px">最近30天：${fmt(monthAgo)} ~ ${fmt(now)}</div>`;
  const records = [];
  for(const key in schedule){
    const item = schedule[key];
    if(!item?.name || !item.done || item.name !== recordStuName) continue;
    const parts = key.split("-");
    const y = Number(parts[0]);
    const m = Number(parts[1]) - 1;
    const d = Number(parts[2]);
    const slotDate = new Date(y, m, d);
    if(slotDate >= monthAgo && slotDate <= now){
      const data = {学生姓名: recordStuName, 上课日期: `${y}-${m+1}-${d}`, 上课时段: formatSlotTime(key)};
      records.push(data);
      currentRecordList.push(data);
    }
  }
  if(records.length === 0){
    listWrap.innerHTML = `<div class="record-empty">最近30天暂无上课记录</div>`;
    return;
  }
  records.sort((a,b)=>b.上课日期.localeCompare(a.上课日期) || b.上课时段.localeCompare(a.上课时段));
  records.forEach(r=>{
    const div = document.createElement("div");
    div.className = "flow-item";
    div.innerText = `${r.上课日期} ${r.上课时段}`;
    listWrap.appendChild(div);
  });
}
function getAllRecordsForStudent(name){
  const all = [];
  for(const key in schedule){
    const item = schedule[key];
    if(!item?.name || !item.done || item.name !== name) continue;
    const parts = key.split("-");
    const y = Number(parts[0]);
    const m = Number(parts[1]) - 1;
    const d = Number(parts[2]);
    all.push({学生姓名: name, 上课日期: `${y}-${m+1}-${d}`, 上课时段: formatSlotTime(key)});
  }
  all.sort((a,b)=>a.上课日期.localeCompare(b.上课日期) || a.上课时段.localeCompare(b.上课时段));
  return all;
}
function exportRecordExcel(){
  const allRecords = getAllRecordsForStudent(recordStuName);
  if(allRecords.length === 0){
    alert("该学生暂无上课记录可导出");
    return;
  }
  const ws = XLSX.utils.json_to_sheet(allRecords);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "课程记录");
  XLSX.writeFile(wb, `${recordStuName}_全部记录.xlsx`);
}
function statPrevWeek(){statWeekOffset--;calcStat()}
function statNextWeek(){statWeekOffset++;calcStat()}
function calcStat(){
  const weekStart = getWeekStart(new Date(), statWeekOffset);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate()+6);
  const fmt = d=>`${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById("statWeekText").innerText = `${fmt(weekStart)} - ${fmt(weekEnd)}`;
  let totalDone = 0;
  const stuStat = {};
  students.forEach(n=>stuStat[n] = 0);
  for(const key in schedule){
    const item = schedule[key];
    if(!item?.name || !item.done) continue;
    const parts = key.split("-");
    const y = Number(parts[0]);
    const m = Number(parts[1]) - 1;
    const d = Number(parts[2]);
    const slotDate = new Date(y, m, d);
    if(slotDate >= weekStart && slotDate <= weekEnd){
      totalDone++;
      stuStat[item.name]++;
    }
  }
  let html = `<div class="stat-total">📊 本周已完成：${totalDone} 课时</div>`;
  for(const name in stuStat){
    const count = stuStat[name];
    if(count > 0){
      html += `<div class="stat-item">${name}：${count} 课时</div>`;
    }
  }
  document.getElementById("statResult").innerHTML = html;
}

/* Memo functions */
function openMemo(name){
  currentMemoStudent = name;
  document.getElementById("memoTitle").innerText = `${name} 的备忘`;
  document.getElementById("memoDate").value = new Date().toISOString().slice(0,10);
  document.getElementById("memoContent").value = "";
  renderMemoList();
  document.getElementById("memoPopup").style.display = "flex";
}
function closeMemoPopup(){
  document.getElementById("memoPopup").style.display = "none";
}
function addMemo(){
  const date = document.getElementById("memoDate").value;
  const content = document.getElementById("memoContent").value.trim();
  if(!date || !content) return;
  if(!studentMemos[currentMemoStudent]){
    studentMemos[currentMemoStudent] = [];
  }
  studentMemos[currentMemoStudent].push({ id: Date.now(), date, content });
  saveAll();
  renderMemoList();
  document.getElementById("memoContent").value = "";
}
function delMemo(student, id){
  if(!studentMemos[student]) return;
  studentMemos[student] = studentMemos[student].filter(m => m.id !== id);
  saveAll();
  renderMemoList();
}
function renderMemoList(){
  const list = document.getElementById("memoList");
  list.innerHTML = "";
  const memos = studentMemos[currentMemoStudent] || [];
  const sorted = [...memos].sort((a, b) => b.date.localeCompare(a.date) || b.id - a.id);
  if(sorted.length === 0){
    list.innerHTML = '<div class="record-empty">暂无备忘</div>';
    return;
  }
  sorted.forEach(m => {
    const div = document.createElement("div");
    div.className = "memo-item";
    const dateSpan = document.createElement("span");
    dateSpan.className = "memo-date";
    dateSpan.innerText = m.date;
    div.appendChild(dateSpan);
    const contentDiv = document.createElement("div");
    contentDiv.className = "memo-content-text";
    contentDiv.innerText = m.content;
    div.appendChild(contentDiv);
    const actions = document.createElement("div");
    actions.className = "memo-actions";
    const delBtn = document.createElement("button");
    delBtn.className = "memo-btn memo-btn-del";
    delBtn.innerText = "删除";
    delBtn.onclick = () => delMemo(currentMemoStudent, m.id);
    actions.appendChild(delBtn);
    div.appendChild(actions);
    list.appendChild(div);
  });
}

function saveAll(){
  localStorage.setItem("teacherSchedule", JSON.stringify(schedule));
  localStorage.setItem("teacherStudents", JSON.stringify(students));
  localStorage.setItem("teacherStudentMemos", JSON.stringify(studentMemos));
}
init();
</script>
